name: poserapp
description: "AI-powered pose suggestion camera app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.12.0
  flutter_riverpod: ^3.3.1
  permission_handler: ^12.0.0
  go_router: ^17.2.3
  flutter_animate: ^4.5.2
  gal: ^2.3.0
  google_mlkit_pose_detection: ^0.12.0
  google_mlkit_image_labeling: ^0.12.0
  path_drawing: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/poses/
